format:
  chat: "{badges}{channel_prefix}{prefix}{display_name_anim}{suffix}&7: {message}"
  join: "&8[&a+&8] &7{player}"
  quit: "&8[&c-&8] &7{player}"

channels:
  local:
    enabled: true
    display: "L"
    color: "&7"
    range: 100
    permission: "prochat.channel.local"
    priority: 1
  global:
    enabled: true
    display: "G"
    color: "&a"
    range: -1
    permission: "prochat.channel.global"
    priority: 2
  admin:
    enabled: true
    display: "A"
    color: "&c"
    range: -1
    permission: "prochat.channel.admin"
    priority: 3

animated_gradient:
  enabled: true
  speed: 3
  cycle_colors:
    - "#ff4444"
    - "#ff8800"
    - "#ffdd00"
    - "#44ff44"
    - "#00ddff"
    - "#8844ff"
    - "#ff44ff"

badges:
  enabled: true
  list:
    admin: "&4[ADMIN]&r "
    vip: "&6[VIP]&r "
    donator: "&a[★]&r "
    default: "&7[✦]&r "

chat_particles:
  enabled: true
  type: "HEART"
  count: 8
  speed: 0.05
  spread: 0.6
  permission: "prochat.particles"

personal_sound:
  enabled: true
  default: "block.note_block.pling"
  permission: "prochat.sound"

mention:
  enabled: true
  format: "&b&l@{player}&r"
  permission: "prochat.mention"
  clickable: true
  sound:
    enabled: true
    type: "entity.experience_orb.pickup"
    volume: 0.5
    pitch: 1.5
  actionbar:
    enabled: true
    message: "&b&l⚡ {player} &bmentioned you!"
  title:
    enabled: false
    title: "&b&lMENTION!"
    subtitle: "&7by {player}"
    fade_in: 10
    stay: 40
    fade_out: 10
  particles:
    enabled: true
    type: "HAPPY_VILLAGER"
    count: 15
    speed: 0.2
  personal_highlight:
    enabled: true
    color: "&e&l"

anti_spam:
  enabled: true
  cooldown:
    enabled: true
    seconds: 2
  caps:
    enabled: true
    min_length: 5
    threshold: 75
  swear:
    enabled: true
    words: []
    replace_char: "*"
  repeat:
    enabled: true
    max_similarity: 85
